<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Firebase - Gothic Style</title>

  <style>
    body {
      background: #0a0000; /* Fundo mais escuro para destacar o brilho */
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      margin: 0;
      overflow: hidden; /* Evita barra de rolagem por causa das cruzes */
    }

    /* --- Efeito das Cruzes --- */
    .cross-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .cross {
      position: absolute;
      bottom: -50px;
      font-size: 2rem;
      opacity: 0;
      animation: moveUp 7s linear infinite;
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
    }

    @keyframes moveUp {
      0% { transform: translateY(0); opacity: 0; filter: hue-rotate(0deg); }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { transform: translateY(-110vh); opacity: 0; filter: hue-rotate(360deg); }
    }

    /* --- Container de Login --- */
    .login-container {
      position: relative;
      z-index: 10; /* Garante que o login fique acima das cruzes */
      margin-top: 100px;
      background: rgba(42, 0, 0, 0.9); /* Semi-transparente para ver as cruzes atrás */
      padding: 30px;
      border-radius: 10px;
      border: 2px solid #b87333;
      box-shadow: 0 0 20px rgba(184, 115, 51, 0.3);
      width: 90%;
      max-width: 350px;
      margin-left: auto;
      margin-right: auto;
    }

    input, button {
      display: block;
      margin: 15px auto;
      padding: 12px;
      width: 90%;
      border-radius: 5px;
      border: 1px solid #444;
      background: #1a0000;
      color: white;
    }

    button {
      background: #b87333;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #d48a4a;
      box-shadow: 0 0 10px #b87333;
    }

    .shake { animation: shake 0.3s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

<div class="cross-container">
  <span class="cross" style="left: 10%; animation-delay: 0s; color: #00e5ff;">†</span>
  <span class="cross" style="left: 30%; animation-delay: 2s; color: #f0f8ff;">†</span>
  <span class="cross" style="left: 50%; animation-delay: 4s; color: #ff0055;">†</span>
  <span class="cross" style="left: 70%; animation-delay: 1s; color: #b87333;">†</span>
  <span class="cross" style="left: 90%; animation-delay: 5s; color: #ffffff;">†</span>
</div>

<div class="login-container" id="loginBox">
  <h2 style="color: #b87333; text-shadow: 2px 2px 4px #000;">Arquivos - Acesso</h2>
  <input type="email" id="email" placeholder="Seu Gmail">
  <input type="password" id="password" placeholder="Senha">
  <button onclick="login()">Entrar e Acessar Grupo</button>
  <button onclick="register()" style="background: #444;">Criar conta</button>
  <p onclick="recover()" style="font-size: 12px; cursor: pointer; color: #aaa;">Esqueci a senha</p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAkE0DEk4M2cRuGV3KUft0uChblI5OEaZY",
    authDomain: "projetokid2026.firebaseapp.com",
    projectId: "projetokid2026"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  let tentativas = 0;

  // COLOQUE SEU LINK DO TELEGRAM AQUI
  const linkTelegram = "https://t.me/+1MiaDQdK2W1iODgx";

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const box = document.getElementById("loginBox");

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        // Redireciona diretamente após o login
        window.location.href = linkTelegram;
      })
      .catch((e) => {
        tentativas++;
        box.classList.add("shake");
        setTimeout(() => box.classList.remove("shake"), 300);
        if (tentativas >= 3) alert("Tente recuperar sua senha.");
      });
  }

  function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    auth.createUserWithEmailAndPassword(email, password)
      .then(() => alert("Conta criada! Agora você pode entrar."))
      .catch((e) => alert("Erro ao criar: " + e.message));
  }

  function recover() {
    const email = document.getElementById("email").value;
    if(!email) return alert("Digite seu e-mail primeiro!");
    auth.sendPasswordResetEmail(email)
      .then(() => alert("E-mail de recuperação enviado!"))
      .catch((e) => alert(e.message));
  }
</script>

</body>
</html>
